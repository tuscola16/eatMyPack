<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <defs>
    <filter id="shadowSm" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#2C2118" flood-opacity="0.06"/>
    </filter>
    <filter id="shadowMd" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#2C2118" flood-opacity="0.08"/>
    </filter>
    <clipPath id="planClip">
      <path d="M0,0 H390 V136 Q390,160 366,160 H24 Q0,160 0,136 Z"/>
    </clipPath>
    <linearGradient id="planSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EDA860"/>
      <stop offset="50%" stop-color="#F5DDB8"/>
      <stop offset="100%" stop-color="#F5F0E8"/>
    </linearGradient>
  </defs>

  <!-- Phone frame -->
  <rect width="390" height="844" rx="40" fill="#F4EFE6"/>

  <!-- Status bar -->
  <text x="24" y="22" font-family="DM Sans, sans-serif" font-size="14" font-weight="500" fill="#FAF7F2">9:41</text>
  <rect x="366" y="14" width="16" height="9" rx="2" stroke="#FAF7F2" stroke-width="1" fill="none"/>
  <rect x="368" y="16" width="12" height="5" rx="1" fill="#FAF7F2"/>

  <!-- ===== HERO BANNER (plan scene - compact) ===== -->
  <g clip-path="url(#planClip)">
    <rect width="390" height="160" fill="url(#planSky)"/>
    <!-- Distant mountains -->
    <path d="M0,140 C40,120 80,100 120,90 C150,83 170,88 195,75 C220,88 240,83 270,90 C310,100 350,120 390,130 L390,160 L0,160 Z" fill="#8FA87A" opacity="0.5"/>
    <!-- Trail markers -->
    <line x1="80" y1="125" x2="80" y2="115" stroke="#C4623A" stroke-width="2"/>
    <circle cx="80" cy="113" r="3" fill="#C4623A"/>
    <line x1="160" y1="112" x2="160" y2="102" stroke="#C4623A" stroke-width="2"/>
    <circle cx="160" cy="100" r="3" fill="#C4623A"/>
    <line x1="240" y1="108" x2="240" y2="98" stroke="#C4623A" stroke-width="2"/>
    <circle cx="240" cy="96" r="3" fill="#C4623A"/>
    <line x1="320" y1="118" x2="320" y2="108" stroke="#C4623A" stroke-width="2"/>
    <circle cx="320" cy="106" r="3" fill="#C4623A"/>
    <!-- Trail path -->
    <path d="M20,145 C60,135 100,125 160,110 C220,100 280,105 370,120" stroke="#C4623A" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
    <!-- Small runner -->
    <circle cx="100" cy="120" r="3.5" fill="#3A2E22"/>
    <line x1="100" y1="124" x2="100" y2="133" stroke="#3A2E22" stroke-width="2" stroke-linecap="round"/>
    <path d="M97,127 L100,125 L103,128" stroke="#3A2E22" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M100,133 L97,139 M100,133 L103,138" stroke="#3A2E22" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Back arrow -->
  <path d="M24,52 L16,60 L24,68" stroke="#FAF7F2" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="40" y="64" font-family="Nunito, sans-serif" font-size="17" font-weight="700" fill="#FAF7F2">Western States 100</text>

  <!-- ===== SUMMARY STAT STRIP ===== -->
  <g filter="url(#shadowSm)">
    <rect x="16" y="172" width="358" height="88" rx="16" fill="#FAF7F2"/>
  </g>
  <!-- Config line -->
  <text x="195" y="192" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="12" fill="#7A6855">100mi · 29 hrs · Hot</text>
  <!-- Stat columns -->
  <!-- Total Cal -->
  <g transform="translate(56, 204)">
    <text x="0" y="0" font-family="DM Sans, sans-serif" font-size="11" font-weight="500" fill="#7A6855" text-anchor="middle">TOTAL CAL</text>
    <text x="0" y="24" font-family="Nunito, sans-serif" font-size="22" font-weight="700" fill="#C4623A" text-anchor="middle">6,200</text>
  </g>
  <!-- Divider -->
  <line x1="120" y1="200" x2="120" y2="244" stroke="#EDE5D8" stroke-width="1"/>
  <!-- Weight -->
  <g transform="translate(162, 204)">
    <text x="0" y="0" font-family="DM Sans, sans-serif" font-size="11" font-weight="500" fill="#7A6855" text-anchor="middle">WEIGHT</text>
    <text x="0" y="24" font-family="Nunito, sans-serif" font-size="22" font-weight="700" fill="#2C2118" text-anchor="middle">4.2 lb</text>
  </g>
  <!-- Divider -->
  <line x1="215" y1="200" x2="215" y2="244" stroke="#EDE5D8" stroke-width="1"/>
  <!-- Items -->
  <g transform="translate(258, 204)">
    <text x="0" y="0" font-family="DM Sans, sans-serif" font-size="11" font-weight="500" fill="#7A6855" text-anchor="middle">ITEMS</text>
    <text x="0" y="24" font-family="Nunito, sans-serif" font-size="22" font-weight="700" fill="#2C2118" text-anchor="middle">28</text>
  </g>
  <!-- Divider -->
  <line x1="305" y1="200" x2="305" y2="244" stroke="#EDE5D8" stroke-width="1"/>
  <!-- Cal/hr -->
  <g transform="translate(346, 204)">
    <text x="0" y="0" font-family="DM Sans, sans-serif" font-size="11" font-weight="500" fill="#7A6855" text-anchor="middle">CAL/HR</text>
    <text x="0" y="24" font-family="Nunito, sans-serif" font-size="22" font-weight="700" fill="#7A9E6E" text-anchor="middle">214</text>
  </g>

  <!-- ===== PHASE CARD 1: EARLY (EXPANDED) ===== -->
  <g filter="url(#shadowMd)">
    <rect x="16" y="276" width="358" height="260" rx="24" fill="#FAF7F2"/>
  </g>
  <!-- Left accent bar -->
  <rect x="16" y="276" width="4" height="260" rx="2" fill="#E8A83A"/>

  <!-- Phase header -->
  <text x="36" y="304" font-family="Nunito, sans-serif" font-size="17" font-weight="700" fill="#2C2118">Early</text>
  <text x="36" y="322" font-family="DM Sans, sans-serif" font-size="13" fill="#7A6855">0 – 3 hrs</text>

  <!-- Target badges -->
  <rect x="120" y="296" width="64" height="22" rx="11" fill="#F5E2D8"/>
  <text x="152" y="311" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="11" font-weight="500" fill="#C4623A">750 cal</text>
  <rect x="190" y="296" width="52" height="22" rx="11" fill="#EBF3E6"/>
  <text x="216" y="311" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="11" font-weight="500" fill="#4A6B3E">180g</text>

  <!-- Progress ring -->
  <g transform="translate(336, 300)">
    <circle cx="0" cy="0" r="18" stroke="#EBF3E6" stroke-width="4" fill="none"/>
    <circle cx="0" cy="0" r="18" stroke="#7A9E6E" stroke-width="4" fill="none"
            stroke-dasharray="68 113" stroke-dashoffset="28" stroke-linecap="round"
            transform="rotate(-90)"/>
    <text x="0" y="5" text-anchor="middle" font-family="Nunito, sans-serif" font-size="11" font-weight="700" fill="#4A6B3E">60%</text>
  </g>

  <!-- Nutrition progress bars -->
  <g transform="translate(36, 340)">
    <text x="0" y="0" font-family="DM Sans, sans-serif" font-size="11" fill="#7A6855">Calories</text>
    <rect x="60" y="-8" width="220" height="6" rx="3" fill="#F5E2D8"/>
    <rect x="60" y="-8" width="132" height="6" rx="3" fill="#C4623A"/>
    <text x="290" y="0" font-family="DM Sans, sans-serif" font-size="11" fill="#C4623A">450/750</text>
  </g>
  <g transform="translate(36, 360)">
    <text x="0" y="0" font-family="DM Sans, sans-serif" font-size="11" fill="#7A6855">Carbs</text>
    <rect x="60" y="-8" width="220" height="6" rx="3" fill="#EBF3E6"/>
    <rect x="60" y="-8" width="154" height="6" rx="3" fill="#7A9E6E"/>
    <text x="290" y="0" font-family="DM Sans, sans-serif" font-size="11" fill="#7A9E6E">126/180g</text>
  </g>

  <!-- Divider -->
  <line x1="36" y1="376" x2="354" y2="376" stroke="#EDE5D8" stroke-width="1"/>

  <!-- Food item 1 -->
  <g transform="translate(36, 386)">
    <!-- Gel icon mini -->
    <g transform="scale(0.06)">
      <path d="M222.31 130.866C172.575 112.201 188.098 137.912 174.551 152.194C174.551 152.194 135.964 197.252 120.371 212.896C104.779 228.539 157.216 157.137 94.686 224.79C49.8342 268.574 49.7368 231.352 53.7501 218.228C57.7633 205.103 115.957 120.202 37.2954 185.005C-41.3657 249.809 25.6569 82.4686 58.1647 123.073C90.6726 163.678 109.134 68.1133 58.1647 44.7349C7.1955 21.3565 125.384 -9.80395 113.147 38.9928C100.91 87.7896 177.225 112.445 190.203 38.9928C203.181 -34.4594 264.022 15.5864 232.744 38.9928C201.467 62.3993 174.214 84.276 252.41 68.1133C330.606 51.9507 272.045 149.531 222.31 130.866Z" fill="#807F7F"/>
      <path d="M116.51 185.522C119.01 181.522 123.01 162.022 123.01 162.022H122.51C121.51 162.022 109.436 171.31 108.51 171.022C107.584 170.734 98.0103 156.522 98.5103 154.022C99.0103 151.522 155.51 118.522 158.51 119.522C161.51 120.522 168.01 136.522 168.01 136.522C167.01 138.022 153.51 142.022 155.01 144.022C156.51 146.022 176.01 151.022 178.51 150.522C181.01 150.022 197.51 137.522 200.01 138.022C202.51 138.522 276.51 266.022 275.51 269.522C274.51 273.022 174.01 330.522 170.01 330.022C166.01 329.522 93.5103 202.022 94.5103 198.522C95.5103 195.022 114.01 189.522 116.51 185.522Z" fill="#D9D9D9"/>
    </g>
    <text x="30" y="10" font-family="DM Sans, sans-serif" font-size="14" font-weight="500" fill="#2C2118">GU Energy Gel</text>
    <text x="30" y="26" font-family="DM Sans, sans-serif" font-size="11" fill="#7A6855">GU · Salted Caramel</text>
    <!-- Servings badge -->
    <rect x="220" y="-4" width="40" height="20" rx="10" fill="#EBF3E6"/>
    <text x="240" y="10" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="11" font-weight="500" fill="#4A6B3E">×3</text>
    <!-- Calories -->
    <text x="274" y="10" font-family="Nunito, sans-serif" font-size="13" font-weight="700" fill="#C4623A">300 cal</text>
  </g>

  <!-- Food item 2 -->
  <g transform="translate(36, 424)">
    <!-- Drink mix icon mini -->
    <g transform="scale(0.03)">
      <path d="M125.713 18.8806V3.38058H213.213V18.8806H199.213V37.8806L342.213 50.3806V159.381C340.928 163.794 322.213 176.881 319.213 181.381V582.881C213.77 605.264 139.151 604.942 1.71307 582.881V218.381C5.67777 211.985 27.7131 208.881 32.7131 205.881V50.3806L143.213 37.8806V18.8806H125.713Z" fill="#D9D9D9" stroke="black" stroke-width="0.5"/>
      <path d="M1.71316 96.3806C-0.0178448 78.9253 0.213188 53.3806 1.71316 50.3806C3.21314 47.3806 142.713 37.8806 142.713 37.8806L125.713 18.3806V3.3806C161.171 -0.398482 180.268 -0.521425 212.713 3.3806V18.8806H199.713C197.382 26.3006 197.589 30.4607 199.713 37.8806C199.713 37.8806 340.213 46.8806 342.213 50.3806C344.213 53.8806 343.787 78.4165 342.213 96.3806C206.933 114.949 132.474 114.198 1.71316 96.3806Z" fill="#787777"/>
    </g>
    <text x="30" y="10" font-family="DM Sans, sans-serif" font-size="14" font-weight="500" fill="#2C2118">Tailwind Endurance Fuel</text>
    <text x="30" y="26" font-family="DM Sans, sans-serif" font-size="11" fill="#7A6855">Tailwind · Lemon</text>
    <rect x="220" y="-4" width="40" height="20" rx="10" fill="#EBF3E6"/>
    <text x="240" y="10" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="11" font-weight="500" fill="#4A6B3E">×2</text>
    <text x="274" y="10" font-family="Nunito, sans-serif" font-size="13" font-weight="700" fill="#C4623A">200 cal</text>
  </g>

  <!-- Food item 3 -->
  <g transform="translate(36, 462)">
    <!-- Bar icon mini -->
    <g transform="scale(0.035)">
      <path d="M257.833 5.83948C298.766 13.7515 356.228 34.7972 372.333 48.8395L231.832 282.839L109.332 327.339C65.4449 309.11 17.4125 276.179 6.33245 265.339C-4.74762 254.5 2.7088 12.1194 6.33245 5.83948Z" fill="#807F7F"/>
      <path d="M371.275 327.265C362.361 332.687 119.032 331.253 108.775 327.265C98.5188 323.277 99.8059 55.2778 108.275 48.2648C116.745 41.2519 363.284 45.7122 371.275 48.2648C379.267 50.8175 380.19 321.843 371.275 327.265Z" fill="#D9D9D9"/>
    </g>
    <text x="30" y="10" font-family="DM Sans, sans-serif" font-size="14" font-weight="500" fill="#2C2118">Spring Energy Koffee</text>
    <text x="30" y="26" font-family="DM Sans, sans-serif" font-size="11" fill="#7A6855">Spring Energy · ☕</text>
    <rect x="220" y="-4" width="40" height="20" rx="10" fill="#EBF3E6"/>
    <text x="240" y="10" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="11" font-weight="500" fill="#4A6B3E">×1</text>
    <text x="274" y="10" font-family="Nunito, sans-serif" font-size="13" font-weight="700" fill="#C4623A">180 cal</text>
  </g>

  <!-- Chevron (collapse) -->
  <path d="M190,518 L195,524 L200,518" stroke="#B0A090" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- ===== PHASE CARD 2: MID (COLLAPSED) ===== -->
  <g filter="url(#shadowMd)">
    <rect x="16" y="548" width="358" height="64" rx="24" fill="#FAF7F2"/>
  </g>
  <!-- Left accent bar -->
  <rect x="16" y="548" width="4" height="64" rx="2" fill="#7A9E6E"/>
  <!-- Phase header -->
  <text x="36" y="576" font-family="Nunito, sans-serif" font-size="17" font-weight="700" fill="#2C2118">Mid</text>
  <text x="68" y="576" font-family="DM Sans, sans-serif" font-size="13" fill="#7A6855">3 – 8 hrs</text>
  <!-- Progress ring -->
  <g transform="translate(336, 580)">
    <circle cx="0" cy="0" r="16" stroke="#EBF3E6" stroke-width="3.5" fill="none"/>
    <circle cx="0" cy="0" r="16" stroke="#7A9E6E" stroke-width="3.5" fill="none"
            stroke-dasharray="40 101" stroke-dashoffset="25" stroke-linecap="round"
            transform="rotate(-90)"/>
    <text x="0" y="4" text-anchor="middle" font-family="Nunito, sans-serif" font-size="10" font-weight="700" fill="#4A6B3E">40%</text>
  </g>
  <!-- Expand chevron -->
  <path d="M188,596 L195,590 L202,596" stroke="#B0A090" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- ===== PHASE CARD 3: LATE (COLLAPSED) ===== -->
  <g filter="url(#shadowMd)">
    <rect x="16" y="624" width="358" height="64" rx="24" fill="#FAF7F2"/>
  </g>
  <rect x="16" y="624" width="4" height="64" rx="2" fill="#C4623A"/>
  <text x="36" y="652" font-family="Nunito, sans-serif" font-size="17" font-weight="700" fill="#2C2118">Late</text>
  <text x="72" y="652" font-family="DM Sans, sans-serif" font-size="13" fill="#7A6855">8 – 18 hrs</text>
  <g transform="translate(336, 656)">
    <circle cx="0" cy="0" r="16" stroke="#F5E2D8" stroke-width="3.5" fill="none"/>
    <circle cx="0" cy="0" r="16" stroke="#C4623A" stroke-width="3.5" fill="none"
            stroke-dasharray="20 101" stroke-dashoffset="25" stroke-linecap="round"
            transform="rotate(-90)"/>
    <text x="0" y="4" text-anchor="middle" font-family="Nunito, sans-serif" font-size="10" font-weight="700" fill="#C4623A">20%</text>
  </g>
  <path d="M188,672 L195,666 L202,672" stroke="#B0A090" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- ===== PHASE CARD 4: NIGHT (COLLAPSED) ===== -->
  <g filter="url(#shadowMd)">
    <rect x="16" y="700" width="358" height="64" rx="24" fill="#FAF7F2"/>
  </g>
  <rect x="16" y="700" width="4" height="64" rx="2" fill="#2C3E50"/>
  <text x="36" y="728" font-family="Nunito, sans-serif" font-size="17" font-weight="700" fill="#2C2118">Night</text>
  <text x="80" y="728" font-family="DM Sans, sans-serif" font-size="13" fill="#7A6855">18 – 26 hrs</text>
  <g transform="translate(336, 732)">
    <circle cx="0" cy="0" r="16" stroke="#E0D5C5" stroke-width="3.5" fill="none"/>
    <text x="0" y="4" text-anchor="middle" font-family="Nunito, sans-serif" font-size="10" font-weight="700" fill="#B0A090">0%</text>
  </g>
  <path d="M188,748 L195,742 L202,748" stroke="#B0A090" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- ===== FLOATING ACTION BUTTONS ===== -->
  <!-- Start Over (outlined) -->
  <rect x="16" y="780" width="170" height="44" rx="22" fill="none" stroke="#7A9E6E" stroke-width="1.5"/>
  <text x="101" y="807" text-anchor="middle" font-family="Nunito, sans-serif" font-size="15" font-weight="600" fill="#7A9E6E">Start Over</text>
  <!-- Save Plan (filled) -->
  <rect x="198" y="780" width="176" height="44" rx="22" fill="#7A9E6E" filter="url(#shadowMd)"/>
  <text x="286" y="807" text-anchor="middle" font-family="Nunito, sans-serif" font-size="15" font-weight="700" fill="#FAF7F2">Save Plan</text>

  <!-- Home indicator -->
  <rect x="142" y="832" width="106" height="4" rx="2" fill="#2C2118" opacity="0.2"/>
</svg>