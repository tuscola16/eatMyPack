<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <defs>
    <!-- Shadows -->
    <filter id="shadowSm" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#2C2118" flood-opacity="0.06"/>
    </filter>
    <filter id="shadowMd" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#2C2118" flood-opacity="0.08"/>
    </filter>
    <!-- Hero sky gradient -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D86A28"/>
      <stop offset="28%" stop-color="#EDA860"/>
      <stop offset="60%" stop-color="#F5DDB8"/>
      <stop offset="100%" stop-color="#F5F0E8"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFDB90" stop-opacity="0.70"/>
      <stop offset="100%" stop-color="#FFDB90" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ridgeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B5C4AA"/>
      <stop offset="100%" stop-color="#9CAE90"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4C5B0"/>
      <stop offset="100%" stop-color="#C2B09A"/>
    </linearGradient>
    <!-- Hero clip -->
    <clipPath id="heroClip">
      <path d="M0,0 H390 V316 Q390,340 366,340 H24 Q0,340 0,316 Z"/>
    </clipPath>
  </defs>

  <!-- ===== PHONE FRAME ===== -->
  <rect width="390" height="844" rx="40" fill="#F4EFE6"/>

