    <!-- Runner -->
    <circle cx="193" cy="279" r="4.5" fill="#3A2E22"/>
    <path d="M189,277 L183,275" stroke="#3A2E22" stroke-width="2" stroke-linecap="round"/>
    <line x1="193" y1="284" x2="193" y2="295" stroke="#3A2E22" stroke-width="3" stroke-linecap="round"/>
    <path d="M188,287 L194,285 L200,288" stroke="#3A2E22" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M193,295 L188,304 M193,295 L199,303" stroke="#3A2E22" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M195,285 L202,284 L203,292 L196,293 Z" fill="#C4623A" opacity="0.90"/>
