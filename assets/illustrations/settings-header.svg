    <path d="M187,-8 C218,-16 322,-4 368,30 C400,55 405,101 388,128 C372,152 328,158 275,152 C222,146 172,124 158,97 C143,69 152,18 187,-8 Z"
          fill="none" stroke="#8FA87A" stroke-width="1.5" opacity="0.25"/>

    <!-- Contour 7: open outer -->
    <path d="M150,-10 C180,-28 320,-22 390,18 L390,60 C390,60 370,100 340,120 C300,145 240,150 185,140 C130,130 80,104 60,78 C40,52 42,14 70,-4 C95,-18 125,-14 150,-10 Z"
