<svg xmlns="http://www.w3.org/2000/svg" width="390" height="780" viewBox="0 0 390 780">
  <defs>
    <!-- Sky gradient: deep terracotta sunrise → warm peach → cream at horizon -->
    <linearGradient id="skyGradOnboard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#C45A20"/>
      <stop offset="22%"  stop-color="#E8904A"/>
      <stop offset="50%"  stop-color="#F5C888"/>
      <stop offset="78%"  stop-color="#F5E0C0"/>
      <stop offset="100%" stop-color="#F5F0E8"/>
    </linearGradient>

    <!-- Sun glow radial -->
    <radialGradient id="sunGlowOnboard" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8A83A" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#E8A83A" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#E8A83A" stop-opacity="0"/>
    </radialGradient>

    <!-- Foreground slope: warm sandy terracotta — NOT the old dark theme -->
    <linearGradient id="slopeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#C8B89A"/>
      <stop offset="100%" stop-color="#B8A888"/>
    </linearGradient>
  </defs>

  <!-- SKY LAYER -->
  <g id="sky">
    <rect x="0" y="0" width="390" height="780" fill="url(#skyGradOnboard)"/>
  </g>

  <!-- SUN: rising behind ridge -->
  <g id="sun">
    <!-- Outer glow -->
    <circle cx="200" cy="310" r="90" fill="url(#sunGlowOnboard)" opacity="0.5"/>
    <!-- Mid glow -->
    <circle cx="200" cy="310" r="60" fill="#E8A83A" opacity="0.5"/>
    <!-- Bright core -->
    <circle cx="200" cy="310" r="35" fill="#E8A83A" opacity="0.9"/>
  </g>

  <!-- SUN RAYS: 8 thin lines radiating outward -->
  <g id="sun-rays" stroke="#E8A83A" stroke-width="2" stroke-linecap="round" opacity="0.25">
    <!-- Ray 0° (right) -->
    <line x1="265" y1="310" x2="320" y2="310"/>
    <!-- Ray 45° (lower-right) -->
    <line x1="248" y1="348" x2="290" y2="390"/>
    <!-- Ray 90° (down) - partially clipped by mountains -->
    <line x1="200" y1="370" x2="200" y2="420"/>
    <!-- Ray 135° (lower-left) -->
    <line x1="152" y1="348" x2="110" y2="390"/>
    <!-- Ray 180° (left) -->
    <line x1="135" y1="310" x2="80" y2="310"/>
    <!-- Ray 225° (upper-left) -->
    <line x1="152" y1="272" x2="110" y2="230"/>
    <!-- Ray 270° (up) -->
    <line x1="200" y1="250" x2="200" y2="195"/>
    <!-- Ray 315° (upper-right) -->
    <line x1="248" y1="272" x2="290" y2="230"/>
  </g>

  <!-- FAR BACKGROUND MOUNTAINS: Presidential Range, sage light #A8C490
       Mt. Washington: broad right ascent, flattish summit area, left flank drops
       Peaks around y=250-290, fills to y=380 -->
  <g id="mountains-far">
    <path
      d="
        M 0,340
        L 0,310
        C 12,305 24,300 38,292
        C 52,284 60,278 70,272
        C 82,264 92,260 100,262
        C 108,264 114,270 122,276
        C 130,282 138,286 148,282
        C 158,278 164,270 172,264
        C 180,258 186,254 196,252
        C 204,250 210,252 216,256
        C 226,262 232,268 240,272
        C 250,277 260,278 270,282
        C 282,287 292,292 300,296
        C 308,300 314,300 322,296
        C 332,290 340,280 352,272
        C 362,264 374,258 390,256
        L 390,380
        L 0,380
        Z
      "
      fill="#A8C490"
    />
  </g>

  <!-- MID MOUNTAINS: sage mid #8FA87A
       Lower flanks, fills y=310-430. Rocky talus jags along top edge -->
  <g id="mountains-mid">
    <path
      d="
        M 0,380
        L 0,360
        C 10,355 20,350 32,342
        L 42,348
        L 54,338
        L 66,346
        L 78,335
        L 90,343
        L 104,332
        L 116,340
        L 130,328
        L 144,337
        L 158,325
        L 172,334
        L 186,322
        L 200,332
        L 214,320
        L 228,330
        L 242,318
        L 256,328
        L 270,316
        L 284,326
        L 298,315
        L 312,324
        L 326,313
        L 340,322
        L 354,312
        L 368,320
        C 378,326 385,330 390,334
        L 390,430
        L 0,430
        Z
      "
      fill="#8FA87A"
    />
  </g>

  <!-- TREELINE BAND: sage deep #5E7A52, jagged spruce/fir silhouettes y=400-460 -->
  <g id="treeline">
    <!-- Base fill for treeline band -->
    <rect x="0" y="440" width="390" height="20" fill="#5E7A52"/>
    <!-- Pointed tree triangles of varying height, spanning full width -->
    <!-- Trees are: triangle pointing up, overlapping, densely packed -->
    <polygon points="0,455 8,418 16,455" fill="#5E7A52"/>
    <polygon points="10,455 20,406 30,455" fill="#5E7A52"/>
    <polygon points="22,455 33,416 44,455" fill="#5E7A52"/>
    <polygon points="36,455 47,402 58,455" fill="#5E7A52"/>
    <polygon points="50,455 60,412 70,455" fill="#5E7A52"/>
    <polygon points="62,455 72,420 82,455" fill="#5E7A52"/>
    <polygon points="74,455 84,408 94,455" fill="#5E7A52"/>
    <polygon points="86,455 98,400 110,455" fill="#5E7A52"/>
    <polygon points="100,455 112,414 124,455" fill="#5E7A52"/>
    <polygon points="114,455 126,404 138,455" fill="#5E7A52"/>
    <polygon points="128,455 140,418 152,455" fill="#5E7A52"/>
    <polygon points="142,455 154,406 166,455" fill="#5E7A52"/>
    <polygon points="156,455 168,398 180,455" fill="#5E7A52"/>
    <polygon points="170,455 182,410 194,455" fill="#5E7A52"/>
    <polygon points="184,455 196,402 208,455" fill="#5E7A52"/>
    <polygon points="198,455 210,416 222,455" fill="#5E7A52"/>
    <polygon points="212,455 224,404 236,455" fill="#5E7A52"/>
    <polygon points="226,455 238,412 250,455" fill="#5E7A52"/>
    <polygon points="240,455 252,400 264,455" fill="#5E7A52"/>
    <polygon points="254,455 266,414 278,455" fill="#5E7A52"/>
    <polygon points="268,455 280,406 292,455" fill="#5E7A52"/>
    <polygon points="282,455 294,418 306,455" fill="#5E7A52"/>
    <polygon points="296,455 308,402 320,455" fill="#5E7A52"/>
    <polygon points="310,455 322,412 334,455" fill="#5E7A52"/>
    <polygon points="324,455 336,404 348,455" fill="#5E7A52"/>
    <polygon points="338,455 350,416 362,455" fill="#5E7A52"/>
    <polygon points="352,455 364,406 376,455" fill="#5E7A52"/>
    <polygon points="366,455 378,418 390,455" fill="#5E7A52"/>
    <!-- Darker base of treeline -->
    <rect x="0" y="448" width="390" height="12" fill="#4A6644" opacity="0.5"/>
  </g>

  <!-- FOREGROUND SLOPE: deep brown #3A2E22 rocky slope fills y=500-780 -->
  <g id="foreground-slope">
    <path
      d="
        M 0,540
        L 0,520
        C 8,515 18,510 30,505
        L 42,512
        L 52,502
        L 65,510
        L 78,498
        L 92,507
        L 106,496
        L 120,505
        L 136,494
        L 150,503
        L 165,492
        L 180,501
        L 195,488
        L 210,498
        L 226,486
        L 242,496
        L 258,484
        L 274,494
        L 290,482
        L 306,492
        L 322,481
        L 338,490
        L 354,480
        L 370,488
        C 380,494 386,498 390,502
        L 390,780
        L 0,780
        Z
      "
      fill="url(#slopeGrad)"
    />

    <!-- Angular rock shapes embedded in slope — warm granite tones -->
    <polygon points="55,540 75,510 95,535 80,548"   fill="#9A8A70" opacity="0.55"/>
    <polygon points="150,560 172,528 196,555 178,572" fill="#A09080" opacity="0.50"/>
    <polygon points="260,548 282,516 308,542 290,560" fill="#9A8A70" opacity="0.50"/>
    <polygon points="330,570 352,538 374,562 358,578" fill="#A09080" opacity="0.45"/>
    <polygon points="30,600 52,572 70,596 50,614"   fill="#9A8A70" opacity="0.38"/>
    <polygon points="200,610 224,582 248,606 228,624" fill="#A09080" opacity="0.38"/>
  </g>

  <!-- TRAIL: terracotta #C4623A winding up foreground slope -->
  <g id="trail">
    <path
      d="
        M 210,780
        C 208,750 205,728 200,705
        C 195,682 188,662 190,638
        C 192,616 198,600 196,578
        C 194,558 188,542 192,522
        C 194,510 197,502 195,492
      "
      fill="none"
      stroke="#C4623A"
      stroke-width="3"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>

  <!-- CAIRN: stacked rock pile to the left of runner at y=510 -->
  <g id="cairn" transform="translate(148, 498)">
    <!-- Bottom rock -->
    <ellipse cx="10" cy="20" rx="10" ry="4" fill="#5A4A36"/>
    <!-- Middle rock -->
    <ellipse cx="10" cy="14" rx="7.5" ry="3.5" fill="#6A5846"/>
    <!-- Upper rock -->
    <ellipse cx="10" cy="9" rx="5.5" ry="3" fill="#7A6856"/>
    <!-- Top rock (smallest) -->
    <ellipse cx="10" cy="5" rx="3.5" ry="2.5" fill="#8A7866"/>
    <!-- Tip -->
    <ellipse cx="10" cy="2" rx="2" ry="1.5" fill="#9A8876"/>
  </g>

  <!-- RUNNER SILHOUETTE: centered at x=195, y=490, cresting ridge
       Stylized ~30x55px, forward lean, one leg back. Heroic posture.
       Terracotta #C4623A for clothing, deep brown #3A2E22 for pack/shadow -->
  <g id="runner" transform="translate(180, 448)">
    <!-- HEAD -->
    <circle cx="18" cy="6" r="6" fill="#3A2E22"/>
    <!-- TORSO: forward lean, terracotta clothing -->
    <path
      d="M 14,12 C 10,16 8,22 9,30 C 10,36 14,40 18,42 C 22,44 26,42 28,38 C 30,33 28,26 24,20 Z"
      fill="#C4623A"
    />
    <!-- PACK on back: dark lump -->
    <path
      d="M 9,14 C 5,18 4,26 5,33 C 6,38 9,40 12,39 C 12,34 11,28 12,22 Z"
      fill="#3A2E22"
    />
    <!-- PACK strap detail -->
    <line x1="12" y1="14" x2="18" y2="16" stroke="#3A2E22" stroke-width="1.5"/>
    <line x1="10" y1="20" x2="16" y2="22" stroke="#3A2E22" stroke-width="1.2" opacity="0.6"/>
    <!-- FRONT ARM: swinging back (right arm, as runner leans fwd) -->
    <path
      d="M 24,18 C 30,22 34,28 33,34"
      fill="none" stroke="#C4623A" stroke-width="3.5" stroke-linecap="round"
    />
    <!-- BACK ARM: swinging forward -->
    <path
      d="M 12,18 C 6,24 2,28 4,36"
      fill="none" stroke="#3A2E22" stroke-width="3" stroke-linecap="round"
    />
    <!-- FRONT LEG: striding forward -->
    <path
      d="M 20,40 C 22,48 24,54 28,60 C 30,64 34,66 36,70"
      fill="none" stroke="#C4623A" stroke-width="4" stroke-linecap="round"
    />
    <!-- Front foot/shoe -->
    <ellipse cx="37" cy="71" rx="5" ry="2.5" fill="#3A2E22" transform="rotate(15, 37, 71)"/>
    <!-- BACK LEG: trailing behind / pushing off -->
    <path
      d="M 16,40 C 14,46 10,50 6,54 C 3,58 0,60 -2,64"
      fill="none" stroke="#3A2E22" stroke-width="4" stroke-linecap="round"
    />
    <!-- Back foot/shoe -->
    <ellipse cx="-3" cy="65" rx="5" ry="2.5" fill="#3A2E22" transform="rotate(-10, -3, 65)"/>
    <!-- LEGS shading / shorts -->
    <path
      d="M 14,40 C 16,44 20,46 22,44 C 24,42 24,40 22,38 L 18,38 Z"
      fill="#A03020" opacity="0.5"
    />
    <!-- Bib number placeholder area (subtle rectangle on torso) -->
    <rect x="14" y="22" width="9" height="7" rx="1" fill="#D4774A" opacity="0.6"/>
  </g>

</svg>
