<svg xmlns="http://www.w3.org/2000/svg" width="390" height="160" viewBox="0 0 390 160">
  <defs>
    <!-- Bottom-only rounded corners r=24 -->
    <clipPath id="clip">
      <path d="M0,0 H390 V136 Q390,160 366,160 H24 Q0,160 0,136 Z"/>
    </clipPath>
    <!-- Background gradient: warm cream -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#F8F2EA"/>
      <stop offset="100%" stop-color="#EDE5D8"/>
    </linearGradient>
    <!-- Subtle item shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#3A2E22" flood-opacity="0.14"/>
    </filter>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Background -->
    <rect width="390" height="160" fill="url(#bgGrad)"/>

    <!-- Subtle Franconia Ridge ghost silhouette at low opacity — adds sense of place -->
    <path d="
      M   0,160 L   0,118 L  20,114 L  40,110
      L  60,106 L  80,100 L 100,104 L 120,108
      L 140,102 L 160,106 L 180,110 L 200,108
      L 220,112 L 240,108 L 260,112 L 280,116
      L 300,112 L 320,116 L 340,118 L 360,114
      L 380,118 L 390,120 L 390,160 Z"
      fill="#A8C490" opacity="0.22"/>

    <!-- === ITEM 1: GEL PACKET — terracotta, left, -15° === -->
    <g transform="rotate(-15,60,85)" filter="url(#shadow)">
      <rect x="50" y="67" width="20" height="36" rx="3" fill="#C4623A"/>
      <rect x="54" y="62" width="12" height="7"  rx="2" fill="#A8502E"/>
      <rect x="54" y="72" width="4"  height="22" rx="1" fill="#D4724A" opacity="0.55"/>
    </g>

    <!-- === ITEM 2: SOFT FLASK — sage, center-left === -->
    <g filter="url(#shadow)">
      <path d="M122,88 L122,50 Q122,45 130,45 Q138,45 138,50 L138,88 Q138,90 130,90 Q122,90 122,88 Z"
            fill="#8FA87A"/>
      <rect x="126" y="40" width="8" height="8" rx="2" fill="#7B9E6B"/>
      <rect x="123" y="52" width="4" height="28" rx="1" fill="#A8C490" opacity="0.50"/>
    </g>

    <!-- === ITEM 3: TRAIL BAR — sand body, terracotta ends === -->
    <g filter="url(#shadow)">
      <rect x="172" y="49" width="56" height="22" rx="3" fill="#D4C5B0"/>
      <rect x="172" y="49" width="14" height="22" rx="3" fill="#C4623A"/>
      <rect x="214" y="49" width="14" height="22" rx="3" fill="#C4623A"/>
      <line x1="192" y1="52" x2="192" y2="68" stroke="#B8A898" stroke-width="1" opacity="0.6"/>
      <line x1="200" y1="52" x2="200" y2="68" stroke="#B8A898" stroke-width="1" opacity="0.6"/>
      <line x1="208" y1="52" x2="208" y2="68" stroke="#B8A898" stroke-width="1" opacity="0.6"/>
    </g>

    <!-- === ITEM 4: GEL PACKET — amber, +10° === -->
    <g transform="rotate(10,268,65)" filter="url(#shadow)">
      <rect x="258" y="47" width="20" height="36" rx="3" fill="#E8A83A"/>
      <rect x="262" y="42" width="12" height="7"  rx="2" fill="#C8882A"/>
      <rect x="262" y="52" width="4"  height="22" rx="1" fill="#F0B84A" opacity="0.55"/>
    </g>

    <!-- === ITEM 5: NUT BUTTER PACKET — dark brown, +15° === -->
    <g transform="rotate(15,335,80)" filter="url(#shadow)">
      <rect x="317" y="65" width="36" height="30" rx="3" fill="#3A2E22"/>
      <rect x="322" y="70" width="26" height="16" rx="2" fill="#F5F0E8" opacity="0.85"/>
      <circle cx="353" cy="80" r="2.5" fill="#2A1E14"/>
    </g>
  </g>
</svg>
