<svg xmlns="http://www.w3.org/2000/svg" width="390" height="340" viewBox="0 0 390 340">
  <defs>
    <!-- Bottom-only rounded corners r=24 -->
    <clipPath id="clip">
      <path d="M0,0 H390 V316 Q390,340 366,340 H24 Q0,340 0,316 Z"/>
    </clipPath>
    <!-- Sky: amber sunrise at top, cream at horizon -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#D86A28"/>
      <stop offset="28%"  stop-color="#EDA860"/>
      <stop offset="60%"  stop-color="#F5DDB8"/>
      <stop offset="100%" stop-color="#F5F0E8"/>
    </linearGradient>
    <!-- Sun radial glow -->
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFDB90" stop-opacity="0.70"/>
      <stop offset="100%" stop-color="#FFDB90" stop-opacity="0"/>
    </radialGradient>
    <!-- Distant ridge gradient -->
    <linearGradient id="ridgeFarGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#B5C4AA"/>
      <stop offset="100%" stop-color="#9CAE90"/>
    </linearGradient>
    <!-- Ground gradient -->
    <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#D4C5B0"/>
      <stop offset="100%" stop-color="#C2B09A"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#clip)">

    <!-- === SKY === -->
    <rect width="390" height="340" fill="url(#skyGrad)"/>

    <!-- Sun glow bloom behind Presidential Range -->
    <ellipse cx="192" cy="95" rx="140" ry="95" fill="url(#sunGlow)"/>
    <!-- Sun disk (peeking above ridge) -->
    <ellipse cx="192" cy="148" rx="28" ry="28" fill="#F5C860" opacity="0.55"/>

    <!-- Cloud wisps upper sky -->
    <path d="M52,85 Q88,72 118,80 Q144,87 162,76"
          stroke="rgba(255,255,255,0.42)" stroke-width="11" fill="none" stroke-linecap="round"/>
    <path d="M235,65 Q272,53 308,62 Q332,69 350,58"
          stroke="rgba(255,255,255,0.30)" stroke-width="7" fill="none" stroke-linecap="round"/>

    <!-- === PRESIDENTIAL RANGE (far, hazy) ===
         Left→right: Eisenhower (dome), Monroe (small bump), Washington (tallest),
         Jefferson, Adams, Madison; fills y=100-210 -->
    <path d="
      M -8,210
      C  18,190  38,168  58,150
      C  72,137  84,144  98,131
      C 108,121 118,113 130,103
      C 142, 94 152,108 164, 98
      C 172, 91 180, 82 192, 71
      C 200, 64 208, 74 216, 67
      C 224, 60 234, 68 244, 64
      C 254, 58 263, 70 272, 65
      C 282, 60 292, 73 306, 81
      C 319, 90 334, 99 354,113
      C 367,123 380,133 398,148
      L 398,212 L -8,212 Z"
      fill="url(#ridgeFarGrad)"/>

    <!-- Rocky summit zone — above treeline, exposed granite -->
    <path d="
      M 162,112 C 170,101 180,88 192,71
      C 200,64 208,74 216,67
      C 224,61 234,69 244,65
      C 240,77 232,87 222,93
      C 212,99 200,99 190,101
      C 180,104 170,111 162,117 Z"
      fill="#C8B898" opacity="0.72"/>

    <!-- Atmospheric haze band between far and mid ranges -->
    <path d="M -8,200 Q195,216 398,200 L398,215 Q195,231 -8,215 Z"
          fill="rgba(245,240,230,0.38)"/>

    <!-- === FRANCONIA RIDGE (mid, closer, sage) ===
         Lafayette right of center (tallest mid), Lincoln left of center, Haystack right -->
    <path d="
      M -8,244
      C  22,224  52,230  80,220
      C 102,212 118,222 140,214
      C 158,208 172,217 195,210
      C 216,204 236,212 260,210
      C 282,208 308,216 338,224
      C 358,230 376,236 398,242
      L 398,258 L -8,258 Z"
      fill="#8FA87A"/>

    <!-- Rocky shoulders on Franconia (above treeline, lighter sage) -->
    <path d="M 155,230 C 165,220 175,213 190,208 C 204,204 212,210 225,208 C 218,218 210,224 200,226 C 190,228 174,230 162,234 Z"
          fill="#A8C290" opacity="0.55"/>

    <!-- === SPRUCE-FIR TREELINE — characteristic New England conifer silhouette === -->
    <path d="
      M -8,272 L -8,256
      L   4,238 L  14,256
      L  20,244 L  30,226 L  40,244
      L  46,238 L  56,220 L  66,238
      L  72,248 L  82,230 L  92,248
      L  98,240 L 108,222 L 118,240
      L 124,250 L 134,232 L 144,250
      L 150,242 L 160,224 L 170,242
      L 176,254 L 186,234 L 196,254
      L 202,244 L 212,226 L 222,244
      L 228,252 L 238,234 L 248,252
      L 254,242 L 264,224 L 274,242
      L 280,250 L 290,232 L 300,250
      L 306,244 L 316,226 L 326,244
      L 332,254 L 342,236 L 352,254
      L 358,246 L 368,228 L 378,246
      L 384,256 L 392,240 L 398,253
      L 398,272 Z"
      fill="#4A6640"/>
    <!-- Treeline base fill -->
    <rect x="-8" y="268" width="408" height="15" fill="#4A6640"/>
    <!-- Subtle depth layer: darker spruce near base -->
    <path d="M -8,278 C 60,272 160,276 260,274 C 328,272 368,277 398,282 L398,288 C 368,285 328,280 260,282 C 160,284 60,280 -8,286 Z"
          fill="#3A5030" opacity="0.7"/>

    <!-- === FOREGROUND GROUND === -->
    <path d="M -8,280 C 60,272 160,276 260,274 C 328,272 368,278 398,284 L398,345 L -8,345 Z"
          fill="url(#groundGrad)"/>

    <!-- Ground texture detail line -->
    <path d="M -8,288 C 80,283 190,287 310,285 C 350,284 376,287 398,290"
          stroke="#C4B098" stroke-width="1.2" fill="none" opacity="0.55"/>

    <!-- Foreground rocks -->
    <ellipse cx="65"  cy="292" rx="9"  ry="5"   fill="#B8A888" opacity="0.60"/>
    <ellipse cx="80"  cy="298" rx="6"  ry="3.5" fill="#C8B898" opacity="0.50"/>
    <ellipse cx="332" cy="290" rx="8"  ry="4"   fill="#B8A888" opacity="0.55"/>
    <ellipse cx="350" cy="296" rx="5"  ry="3"   fill="#C4B498" opacity="0.45"/>

    <!-- === TRAIL — terracotta, sinuous, winds toward Franconia === -->
    <path d="M 30,342 C 80,320 140,300 190,289 C 228,281 264,284 300,276 C 328,270 358,263 384,254"
          stroke="#C4623A" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Trail specular highlight -->
    <path d="M 30,342 C 80,320 140,300 190,289 C 228,281 264,284 300,276 C 328,270 358,263 384,254"
          stroke="rgba(255,240,220,0.25)" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- === RUNNER SILHOUETTE (small, on trail ~x=192 y=286) === -->
    <!-- Head -->
    <circle cx="193" cy="279" r="4.5" fill="#3A2E22"/>
    <!-- Cap brim -->
    <path d="M189,277 L183,275" stroke="#3A2E22" stroke-width="2" stroke-linecap="round"/>
    <!-- Torso -->
    <line x1="193" y1="284" x2="193" y2="295" stroke="#3A2E22" stroke-width="3" stroke-linecap="round"/>
    <!-- Arms -->
    <path d="M188,287 L194,285 L200,288" stroke="#3A2E22" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Legs (mid-stride) -->
    <path d="M193,295 L188,304 M193,295 L199,303" stroke="#3A2E22" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Pack -->
    <path d="M195,285 L202,284 L203,292 L196,293 Z" fill="#C4623A" opacity="0.90"/>

    <!-- Mist at forest base -->
    <path d="M -8,278 Q195,270 398,276 L398,286 Q195,280 -8,288 Z"
          fill="rgba(245,242,236,0.30)"/>

  </g>
</svg>
